<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simucircuit - Ethan Liu</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/simucircuit/styles/simucircuit.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrap">
        <header class="topbar">
            <h1>Simucircuit</h1>
            <a class="home" href="/">← Back</a>
        </header>

        <div class="simu-layout">
            <aside class="palette">
                <div class="palette-title">Components</div>
                <div class="palette-item" data-type="resistor" draggable="true">
                    <span class="palette-icon R">R</span>
                    <span>Resistor</span>
                </div>
                <div class="palette-item" data-type="capacitor" draggable="true">
                    <span class="palette-icon C">C</span>
                    <span>Capacitor</span>
                </div>
                <div class="palette-item" data-type="vsource" draggable="true">
                    <span class="palette-icon V">V</span>
                    <span>DC Voltage Source</span>
                </div>
                <div class="palette-item" data-type="isource" draggable="true">
                    <span class="palette-icon I">I</span>
                    <span>DC Current Source</span>
                </div>
                <div class="palette-item" data-type="vsource_ac" draggable="true">
                    <span class="palette-icon VA">VA</span>
                    <span>AC Voltage Source</span>
                </div>
                <div class="palette-item" data-type="isource_ac" draggable="true">
                    <span class="palette-icon IA">IA</span>
                    <span>AC Current Source</span>
                </div>
                <div class="palette-item" data-type="ground" draggable="true">
                    <span class="palette-icon G">⏚</span>
                    <span>Ground</span>
                </div>
                <div class="palette-hint">Drag onto canvas to add</div>
                <div class="palette-title palette-title-tools">Tools</div>
                <div class="palette-item" data-type="multimeter" draggable="true">
                    <span class="palette-icon MM">MM</span>
                    <span>Multimeter</span>
                </div>
                <div class="palette-item" data-type="scope" draggable="true">
                    <span class="palette-icon S">SC</span>
                    <span>Scope</span>
                </div>
            </aside>

            <main class="workspace-wrap">
                <div class="workspace-toolbar">
                    <button type="button" id="btn-clear" class="ws-btn">Clear all</button>
                    <button type="button" id="btn-run" class="ws-btn ws-btn-primary">Run simulation</button>
                    <button type="button" id="btn-help" class="ws-btn ws-btn-secondary">Keybinds / Help</button>
                    <span class="ws-hint">Connect: drag from one node to another</span>
                </div>
                <div id="workspace" class="workspace">
                    <svg id="wire-layer" class="wire-layer" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <marker id="wire-marker" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                <polygon points="0 0, 6 3, 0 6" fill="var(--wire-color)" />
                            </marker>
                        </defs>
                    </svg>
                    <div id="components-layer" class="components-layer"></div>
                </div>
                <div id="sim-results" class="sim-results" aria-live="polite"></div>
            </main>
        </div>
    </div>

    <!-- Modal + Overlay reused for confirmations, value edit, and help -->
    <div id="simu-overlay" class="simu-overlay hidden"></div>
    <div id="simu-modal" class="simu-modal hidden" role="dialog" aria-modal="true" aria-labelledby="simu-modal-title">
        <div class="simu-modal-inner">
            <div class="simu-modal-header">
                <h2 id="simu-modal-title" class="simu-modal-title"></h2>
            </div>
            <div id="simu-modal-body" class="simu-modal-body"></div>
            <div class="simu-modal-footer">
                <button type="button" id="simu-modal-cancel" class="ws-btn simu-modal-btn">Cancel</button>
                <button type="button" id="simu-modal-ok" class="ws-btn ws-btn-primary simu-modal-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="/simucircuit/src/simucircuit.js"></script>
</body>
</html>
